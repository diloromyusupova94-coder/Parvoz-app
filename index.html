<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parvoz - Arab tili platformasi</title>
    <style>
        /* UMUMIY DIZAYN */
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #b2ebf2 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            color: #004d40; padding-bottom: 50px;
        }

        .header { text-align: center; padding: 40px 20px; }
        .header h1 { font-size: 32px; letter-spacing: 8px; margin: 0; color: #006064; }
        .header p { font-style: italic; opacity: 0.8; margin-top: 5px; }

        .section-title {
            width: 90%; max-width: 450px;
            margin: 30px 0 10px 0; font-weight: bold;
            color: #00838f; text-transform: uppercase; font-size: 14px;
            border-bottom: 2px solid #00acc1; padding-bottom: 5px;
        }

        .container {
            width: 90%; max-width: 450px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px); border-radius: 30px;
            padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.8);
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        /* ILDIZ TAHLILI (INTERAKTIV) */
        .root-circle {
            width: 100px; height: 100px;
            background: #00acc1; color: white;
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-size: 36px; margin: 15px auto;
            cursor: pointer; box-shadow: 0 8px 20px rgba(0,172,193,0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid white;
        }
        .root-circle:active { transform: scale(0.9); }
        #branches { display: none; margin-top: 20px; text-align: left; }
        .branch-item {
            background: white; margin-bottom: 10px; padding: 12px;
            border-radius: 12px; border-left: 5px solid #00acc1;
            animation: slideIn 0.5s ease-out forwards; opacity: 0;
        }
        .branch-item strong { display: block; font-size: 18px; color: #006064; }
        .branch-item span { font-size: 14px; color: #555; }

        /* VIDEO VA DARSLAR */
        .video-wrapper {
            position: relative; padding-bottom: 56.25%;
            height: 0; overflow: hidden; border-radius: 15px;
            background: #000; margin-top: 15px;
        }
        .video-wrapper iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
        }
        .placeholder-video {
            background: #f1f3f4; border-radius: 15px;
            padding: 40px 10px; text-align: center;
            margin-top: 15px; border: 2px dashed #ccc;
        }
        .level-badge {
            display: inline-block; padding: 5px 12px;
            border-radius: 20px; font-size: 11px; font-weight: bold; margin-bottom: 10px;
        }
        .boshlangich { background: #e8f5e9; color: #2e7d32; }
        .orta { background: #fff3e0; color: #ef6c00; }
        .yuqori { background: #ffebee; color: #c62828; }

        audio { width: 100%; height: 35px; margin-top: 10px; }

        /* ANIMATSIYALAR */
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .hint { font-size: 13px; color: #00838f; margin-top: 10px; text-align: center; animation: pulse 2s infinite; }
        @keyframes pulse { 0% {opacity: 0.5;} 50% {opacity: 1;} 100% {opacity: 0.5;} }
    </style>
</head>
<body>

    <div class="header">
        <h1>PARVOZ</h1>
        <p>Bilim bilan ko‘klarga ko‘taril</p>
    </div>

    <div class="section-title">Metodika: Ildizlar</div>
    <div class="container" style="text-align: center;">
        <div style="font-size: 14px; opacity: 0.7;">Ildizni tanlang va qanot yozing:</div>
        <div class="root-circle" onclick="toggleParvoz()">علم</div>
        <div id="hintText" class="hint">Ildizga teging...</div>
        <div id="branches">
            <div class="branch-item" style="animation-delay: 0.1s;">
                <strong>عَالِم (Olim)</strong>
                <span>Ilm sohibi, anglovchi shaxs.</span>
            </div>
            <div class="branch-item" style="animation-delay: 0.2s;">
                <strong>مُعَلِّم (Muallim)</strong>
                <span>Boshqalarga ilm ulashuvchi.</span>
            </div>
            <div class="branch-item" style="animation-delay: 0.3s;">
                <strong>تَعْلِيم (Ta'lim)</strong>
                <span>O‘rganish jarayoni.</span>
            </div>
        </div>
    </div>

    <div class="section-title">O‘quv darslari</div>
    <div id="lessons-list" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <p>Darslar yuklanmoqda...</p>
    </div>

    <script>
        // Ildiz tahlili funksiyasi
        function toggleParvoz() {
            var branches = document.getElementById("branches");
            var hint = document.getElementById("hintText");
            var root = document.querySelector(".root-circle");

            if (branches.style.display === "none" || branches.style.display === "") {
                branches.style.display = "block";
                hint.style.display = "none";
                root.style.transform = "rotate(360deg)";
                root.style.backgroundColor = "#00838f";
            } else {
                branches.style.display = "none";
                hint.style.display = "block";
                root.style.transform = "rotate(0deg)";
                root.style.backgroundColor = "#00acc1";
            }
        }

        // JSON fayldan darslarni yuklash
        async function loadLessons() {
            try {
                const response = await fetch('data.json');
                const lessons = await response.json();
                const listContainer = document.getElementById('lessons-list');
                listContainer.innerHTML = ''; 

                lessons.forEach(lesson => {
                    // Video tekshiruvi
                    let videoHtml = '';
                    if (lesson.videoID && lesson.videoID !== "") {
                        videoHtml = `
                            <div class="video-wrapper">
                                <iframe src="https://www.youtube.com/embed/${lesson.videoID}" allowfullscreen></iframe>
                            </div>`;
                    } else {
                        videoHtml = `
                            <div class="placeholder-video">
                                <span style="font-size: 30px;">⏳</span>
                                <p style="color: #666; font-size: 14px; margin-top: 10px;">Video darslik tez kunda yuklanadi...</p>
                            </div>`;
                    }

                    // Audio tekshiruvi
                    let audioHtml = '';
                    if (lesson.audioURL && lesson.audioURL !== "") {
                        audioHtml = `
                            <div style="margin-top: 15px; background: white; padding: 10px; border-radius: 12px;">
                                <div style="font-size: 12px; margin-bottom: 5px; color: #666;">Dars audiosi:</div>
                                <audio controls><source src="${lesson.audioURL}" type="audio/mpeg"></audio>
                            </div>`;
                    }

                    const card = `
                        <div class="container" style="text-align: left;">
                            <span class="level-badge ${lesson.darajaClass}">${lesson.daraja} daraja</span>
                            <h3 style="margin: 5px 0;">${lesson.mavzu}</h3>
                            <p style="font-size: 14px; color: #444;">${lesson.tavsif}</p>
                            ${videoHtml}
                            ${audioHtml}
                        </div>
                    `;
                    listContainer.innerHTML += card;
                });
            } catch (error) {
                document.getElementById('lessons-list').innerHTML = '<p>Darslarni yuklashda xatolik (data.json faylini tekshiring).</p>';
            }
        }

        loadLessons();
    </script>
</body>
</html>
