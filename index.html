<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parvoz - Arab tili platformasi</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #b2ebf2 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            color: #004d40; padding-bottom: 50px;
        }

        .header { text-align: center; padding: 40px 20px; }
        .header h1 { font-size: 32px; letter-spacing: 8px; margin: 0; color: #006064; }
        .header p { font-style: italic; opacity: 0.8; margin-top: 5px; }

        .section-title {
            width: 90%; max-width: 450px;
            margin: 20px 0 10px 0; font-weight: bold;
            color: #00838f; text-transform: uppercase; font-size: 14px;
        }

        .container {
            width: 90%; max-width: 450px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px); border-radius: 30px;
            padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.8);
            margin-bottom: 20px;
        }

        /* Video va Badge dizayni */
        .video-wrapper {
            position: relative; padding-bottom: 56.25%;
            height: 0; overflow: hidden; border-radius: 15px;
            background: #000; margin-top: 15px;
        }
        .video-wrapper iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
        }
        .level-badge {
            display: inline-block; padding: 5px 12px;
            border-radius: 20px; font-size: 11px; font-weight: bold; margin-bottom: 10px;
        }
        .boshlangich { background: #e8f5e9; color: #2e7d32; }
        .orta { background: #fff3e0; color: #ef6c00; }
        .yuqori { background: #ffebee; color: #c62828; }
        
        audio { width: 100%; height: 35px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>PARVOZ</h1>
        <p>Bilim bilan ko‘klarga ko‘taril</p>
    </div>

    <div class="section-title">O‘quv darslari</div>
    
    <div id="lessons-list" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <p>Darslar yuklanmoqda...</p>
    </div>

    <script>
        // JSON fayldan ma'lumotni o'qish
        async function loadLessons() {
            try {
                const response = await fetch('data.json');
                const lessons = await response.json();
                const listContainer = document.getElementById('lessons-list');
                listContainer.innerHTML = ''; // "Yuklanmoqda" yozuvini o'chirish

                lessons.forEach(lesson => {
                    const card = `
                        <div class="container" style="text-align: left;">
                            <span class="level-badge ${lesson.darajaClass}">${lesson.daraja} daraja</span>
                            <h3 style="margin: 5px 0;">${lesson.mavzu}</h3>
                            <p style="font-size: 14px; color: #444;">${lesson.tavsif}</p>
                            
                            <div class="video-wrapper">
                                <iframe src="https://www.youtube.com/embed/${lesson.videoID}" allowfullscreen></iframe>
                            </div>

                            <div style="margin-top: 15px; background: white; padding: 10px; border-radius: 12px;">
                                <div style="font-size: 12px; margin-bottom: 5px; color: #666;">Dars audiosi:</div>
                                <audio controls>
                                    <source src="${lesson.audioURL}" type="audio/mpeg">
                                </audio>
                            </div>
                        </div>
                    `;
                    listContainer.innerHTML += card;
                });
            } catch (error) {
                document.getElementById('lessons-list').innerHTML = '<p>Xatolik yuz berdi. data.json faylini tekshiring.</p>';
            }
        }

        // Sahifa ochilishi bilan yuklash
        loadLessons();
    </script>

</body>
</html>
