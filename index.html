<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parvoz - Arab tili</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #e0f7fa 0%, #ffffff 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            padding: 30px;
            text-align: center;
            color: #006064;
            letter-spacing: 5px;
        }
        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.8);
            margin-bottom: 20px;
        }
        .root-word {
            font-size: 40px;
            color: #006064;
            text-align: center;
            margin: 10px 0;
            font-family: 'Times New Roman', serif;
        }
        .meaning-tree {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .branch {
            background: white;
            padding: 10px 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .btn-parvoz {
            background: #00acc1;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,172,193,0.3);
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>PARVOZ</h1>
        <p>Arab tili — qanot!</p>
    </div>

    <div class="card">
        <div style="text-align: center; color: #666; font-size: 14px;">Ildiz tahlili:</div>
        <div class="root-word">ع ل م</div>
        <div class="meaning-tree">
            <div class="branch"><span>Olim (عَالِم)</span> <span>Biluvchi</span></div>
            <div class="branch"><span>Ma'lum (مَعْلُوم)</span> <span>Bilinarli</span></div>
            <div class="branch"><span>Muallim (مُعَلِّم)</span> <span>O'rgatuvchi</span></div>
        </div>
    </div>

    <button class="btn-parvoz">PARVOZNI BOSHLASH</button>
</body>
</html>
